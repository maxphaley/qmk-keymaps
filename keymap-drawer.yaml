layout:
  cols_thumbs_notation: "33333+3> 3<+33333"
layers:
  BASE:
    - [Q, W, E, R, T, Y, U, I, O, P]
    - [{h: Gui, t: A}, {h: Alt, t: S}, {h: Ctrl, t: D}, {h: Shift, t: F}, G, H, {h: Shift, t: J}, {h: Ctrl, t: K}, {h: Alt, t: L}, {h: Gui, t: "'"}]
    - [Z, X, C, V, B, N, M, ",", ., /]
    - {h: FUN, t: Del}
    - {h: NUM, t: Space}
    - {h: SYM, t: Tab}
    - {h: SYM, t: BSpace}
    - {h: NAV, t: Enter}
    - {h: MEDIA, t: Esc}
  NUM:
    - ['','','','','','[', 7, 8, 9, ']']
    - [Gui,Alt,Ctrl,Shift,'','=',4,5,6,ScrlLock]
    - ['','','','','',"\\", 1, 2, 3, '`']
    - ['',{type: held},'','-',0,.]
  SYM:
    - ['','','','','','{', '&', '*', '(', '}']
    - [Gui,Alt,Ctrl,Shift,'','+','$','%','^',':']
    - ['','','','','',"|", '!', '@', '#', '~']
    - ['','',{type: held},'__','(',')']
  NAV:
    - [PgUp, Home, UP, End, Insert,'','','','','']
    - [PgDn, LEFT, DOWN, RIGHT, CapWord, '', Shift, Ctrl, Alt, Gui]
    - [Undo, Cut, Copy, Paste, Redo, '','','','','']
    - [Del,Ent,BSpace,'',{type: held},'']
  FUN:
    - ['','','','','',PrtSc, Fn7, Fn8, Fn9, Fn12]
    - [Gui,Alt,Ctrl,Shift,'',ScrlLock, Fn4, Fn5, Fn6, Fn11]
    - ['','','','','',Pause, Fn1, Fn2, Fn3, Fn10]
    - [{type: held},'','',Tab,Enter,App]
  MEDIA:
    - [RGB, RGB, Vol+, RGB, RGB,'','','','','']
    - [RGB, M.Prev, Vol-, M.Next, '', '', Shift, Ctrl, Alt, Gui]
    - ['', '', '', '', '', '','','','','']
    - [Mute,M.Play,M.Stop,'','', {type: held}]
combos:
  - {p: [1, 2], k: "Esc", l: ["BASE"]}
  - {p: [11, 12], k: "BSpc", l: ["BASE"]}
  - {p: [7, 8], k: "Esc", l: ["BASE"]}
  - {p: [18, 19], k: ";", l: ["BASE"]}
